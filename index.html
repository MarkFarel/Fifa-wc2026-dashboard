<!DOCTYPE html>
<html lang="en">
<head>

<style>

    --bg: #0a0f1e;
    --bg2: #111827;
    --bg3: #1a2235;
    --bg4: #1f2d45;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f4ff;
    --text2: #8ea2c0;
    --text3: #4d6380;
    --gold: #f5a623;
    --gold2: #ffd580;
    --blue: #3b82f6;
    --blue2: #60a5fa;
    --green: #22c55e;
    --red: #ef4444;
    --teal: #14b8a6;
    --r: 8px;
    --rl: 12px;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a0f1e 0%, #0f1f3d 50%, #0a0f1e 100%);
    border-bottom: 1px solid var(--border2);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-emblem {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--gold), #e07b00);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: .04em; }
  .header-title span { color: var(--gold); }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

  /* NAV */
  .nav {
    display: flex; gap: 2px; padding: .75rem 1.5rem;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    overflow-x: auto; white-space: nowrap;
  }
  .nav button {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: .04em;
    padding: 6px 16px; border-radius: 6px;
    border: 1px solid transparent;
    background: transparent; color: var(--text2);
    cursor: pointer; transition: all .15s; text-transform: uppercase;
  }
  .nav button.active { background: var(--gold); color: #0a0f1e; border-color: var(--gold); }
  .nav button:hover:not(.active) { background: var(--bg3); color: var(--text); border-color: var(--border2); }

  /* MAIN */
  .main { padding: 1.25rem 1.5rem; max-width: 1400px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* FILTERS & TOOLS */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: .9rem; align-items: center; }
  .filter-row select, .filter-row input {
    font-size: 12px; padding: 6px 10px;
    border-radius: 6px; border: 1px solid var(--border2);
    background: var(--bg3); color: var(--text);
    font-family: 'Barlow', sans-serif;
  }
  .filter-row select:focus, .filter-row input:focus { outline: none; border-color: var(--gold); }
  .btn {
    font-size: 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--border2); background: var(--bg3);
    color: var(--text2); cursor: pointer; transition: all .15s;
  }
  .btn:hover { background: var(--bg4); color: var(--text); border-color: var(--gold); }
  .btn-gold { background: var(--gold); color: #0a0f1e; border-color: var(--gold); }
  .btn-gold:hover { background: var(--gold2); }

  /* SECTION LABEL */
  .sec-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .1em; color: var(--text3);
    padding: .75rem 0 .4rem;
    border-top: 1px solid var(--border);
    margin-top: .5rem;
  }
  .sec-label:first-child { border-top: none; margin-top: 0; }

    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 10px 14px;
    margin-bottom: 6px; display: flex; align-items: center;
    gap: 12px; flex-wrap: wrap; transition: border-color .15s;

  .match-card:hover { border-color: var(--border2); }
  .match-no { font-size: 10px; color: var(--text3); width: 28px; flex-shrink: 0; font-family: 'Barlow Condensed', sans-serif; }
  
  .match-badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 99px; font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: .04em; text-transform: uppercase; flex-shrink: 0;
  }
  .badge-group { background: rgba(59,130,246,.18); color: var(--blue2); border: 1px solid rgba(59,130,246,.3); }
  .badge-r32 { background: rgba(245,166,35,.18); color: var(--gold); border: 1px solid rgba(245,166,35,.3); }

  .engine-team {

  .engine-team.home-align { text-align: right; }
  .engine-team.away-align { text-align: left; }
  
  .score-input {

    border: 1px solid var(--border2); border-radius: 4px;
    color: var(--text); font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 700; text-align: center;
  }
  .score-input:focus { outline: none; border-color: var(--gold); background: var(--bg4); }

  .engine-vs { color: var(--text3); font-size: 10px; font-weight: 600; text-transform: uppercase; width: 16px; text-align: center; }

  .match-venue { font-size: 10px; color: var(--text3); margin-top: 1px; }

  .group-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; }
  .group-card-head {

    font-size: 13px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; color: var(--text2);

  .grow { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-top: 1px solid var(--border); font-size: 12px; }

  .gpos { font-size: 10px; color: var(--text3); width: 12px; font-family: 'Barlow Condensed', sans-serif; }
  .gflag { font-size: 15px; width: 20px; text-align: center; }

  .odds-prob { font-size: 11px; color: var(--text2); }

  .odds-bar { height: 3px; border-radius: 99px; background: linear-gradient(90deg, var(--blue), var(--teal)); }
  .tier-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin: 1rem 0 .5rem; }
  .chart-outer { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--rl); padding: 1rem; margin-top: .75rem; }
  .chart-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: .75rem; }

    .match-card { flex-direction: column; align-items: flex-start; gap: 8px; }
    .match-engine { width: 100%; justify-content: flex-start; }
    .match-meta { text-align: left; margin-left: 0; }

  @media (max-width: 600px) {

    .main { padding: .75rem 1rem; }

function badgeClass(round){
  if(round==='Group Stage') return 'badge-group';
  if(round==='Round of 32') return 'badge-r32';
  if(round==='Round of 16') return 'badge-r16';
  if(round==='Quarter-final') return 'badge-qf';
  if(round==='Semi-final') return 'badge-sf';
  return 'badge-f';
}

function updateScore(matchId, type, val) {
  if (!scores[matchId]) scores[matchId] = [null, null];
  scores[matchId][type === 'home' ? 0 : 1] = val === "" ? null : parseInt(val, 10);

  const match = FIXTURES.find(f => f.id === matchId);
  if (match && match.isKO) {
    if (scores[matchId][0] !== null && scores[matchId][1] !== null && scores[matchId][0] === scores[matchId][1]) {
      if (!penScores[matchId]) penScores[matchId] = [null, null];
    } else {
      delete penScores[matchId];
    }
    evaluateKnockoutProgression(matchId);
  } else {
    calculateGroupStandingsAndSeedR32();
  }
  renderStandings();
  renderFixtures();
}

function updatePenScore(matchId, type, val) {
  if (!penScores[matchId]) penScores[matchId] = [null, null];
  penScores[matchId][type === 'home' ? 0 : 1] = val === "" ? null : parseInt(val, 10);
  evaluateKnockoutProgression(matchId);
  renderFixtures();
}

function calculateGroupStandingsAndSeedR32() {
  let groupWinners = {};
  let groupRunnersUp = {};
  let thirdPlacePool = [];

  Object.entries(GROUP_TEAMS).forEach(([grp, teams]) => {
    const stats = teams.map(t => {
      let w=0, d=0, l=0, gf=0, ga=0, p=0;
      FIXTURES.filter(f => f.group === grp).forEach(f => {
        const s = scores[f.id]; if (!s || s[0] === null || s[1] === null) return;
        if (f.home === t.name) { gf += s[0]; ga += s[1]; p++; if (s[0] > s[1]) w++; else if (s[0] === s[1]) d++; else l++; }
        if (f.away === t.name) { gf += s[1]; ga += s[0]; p++; if (s[1] > s[0]) w++; else if (s[0] === s[1]) d++; else l++; }
      });
      return { name: t.name, pts: (w * 3) + d, gd: gf - ga, gf: gf };
    }).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

    groupWinners[grp] = stats[0].name;
    groupRunnersUp[grp] = stats[1].name;
    thirdPlacePool.push({ name: stats[2].name, pts: stats[2].pts, gd: stats[2].gd, gf: stats[2].gf, fromGroup: grp });
  });

  thirdPlacePool.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  const topThirdPlace = thirdPlacePool.slice(0, 8); 

  R32_SEED_BLUEPRINT.forEach(blueprint => {
    const targetMatch = FIXTURES.find(f => f.id === blueprint.id);
    
    if (blueprint.homeSource.type === '1st') targetMatch.home = groupWinners[blueprint.homeSource.grp];
    else if (blueprint.homeSource.type === '2nd') targetMatch.home = groupRunnersUp[blueprint.homeSource.grp];

    if (blueprint.awaySource.type === '2nd') targetMatch.away = groupRunnersUp[blueprint.awaySource.grp];
    else if (blueprint.awaySource.type === '3rd') {
      targetMatch.away = topThirdPlace[blueprint.awaySource.idx] ? topThirdPlace[blueprint.awaySource.idx].name : `3rd Group ${blueprint.awaySource.idx + 1}`;
    }
  });

  for (let id = 73; id <= 104; id++) {
    evaluateKnockoutProgression(id);
  }
}

function evaluateKnockoutProgression(matchId) {
  const match = FIXTURES.find(f => f.id === matchId);
  if (!match || !match.isKO) return;
  const s = scores[matchId];
  if (!s || s[0] === null || s[1] === null) return;

  let winner = "";
  if (s[0] > s[1]) winner = match.home;
  else if (s[1] > s[0]) winner = match.away;
  else {
    const p = penScores[matchId];
    if (p && p[0] !== null && p[1] !== null) {
      winner = p[0] > p[1] ? match.home : match.away;
    }
  }

  if (winner && KNOCKOUT_MAPPING[matchId]) {
    const route = KNOCKOUT_MAPPING[matchId];
    const targetMatch = FIXTURES.find(f => f.id === route.nextMatch);
    if (targetMatch) {
      if (route.slot === 'home') targetMatch.home = winner;
      else targetMatch.away = winner;
    }
  }
}

function renderFixtures(){
  const round=document.getElementById('roundFilter').value;
  let lastDate='',html='';
  
  let filtered=FIXTURES.filter(f=>{
    if(round!=='all'&&!f.round.includes(round)) return false;
    return true;
  });

  filtered.forEach(f=>{
    if(f.date!==lastDate){html+=`<div class="sec-label">${f.date}</div>`;lastDate=f.date;}
    
    const scoreHome = (scores[f.id] && scores[f.id][0] !== null) ? scores[f.id][0] : "";
    const scoreAway = (scores[f.id] && scores[f.id][1] !== null) ? scores[f.id][1] : "";
    const showPens = (scores[f.id] && scores[f.id][0] !== null && scores[f.id][1] !== null && scores[f.id][0] === scores[f.id][1] && f.isKO);
    const penHome = (penScores[f.id] && penScores[f.id][0] !== null) ? penScores[f.id][0] : "";
    const penAway = (penScores[f.id] && penScores[f.id][1] !== null) ? penScores[f.id][1] : "";

    html+=`
      <div class="match-card">
        <div class="match-no">#${f.id}</div>
        <span class="match-badge ${badgeClass(f.round)}">${f.group!=='—'?`Group ${f.group}`:f.round}</span>
        
        <div class="match-engine">
          <div class="engine-team home-align">
            ${f.home} 
            ${showPens ? `<div class="pens-wrapper">(P) <input type="number" class="pens-input" value="${penHome}" oninput="updatePenScore(${f.id}, 'home', this.value)"></div>` : ''}
          </div>
          <input type="number" min="0" class="score-input" value="${scoreHome}" oninput="updateScore(${f.id}, 'home', this.value)">
          <div class="engine-vs">vs</div>
          <input type="number" min="0" class="score-input" value="${scoreAway}" oninput="updateScore(${f.id}, 'away', this.value)">
          <div class="engine-team away-align">
            ${showPens ? `<div class="pens-wrapper"><input type="number" class="pens-input" value="${penAway}" oninput="updatePenScore(${f.id}, 'away', this.value)"> (P)</div>` : ''}
            ${f.away}
          </div>
        </div>
        <div class="match-meta">📍 ${f.venue}</div>
      </div>`;
  });
  document.getElementById('fixtureList').innerHTML=html;
}

function renderStandings(){
  const grid=document.getElementById('standingsGrid');
  grid.innerHTML='';
  Object.entries(GROUP_TEAMS).forEach(([grp,teams]) => {
    const stats=teams.map(t=>{
      let w=0,d=0,l=0,gf=0,ga=0,p=0;
      FIXTURES.filter(f=>f.group===grp).forEach(f => {
        const s=scores[f.id]; if(!s || s[0]===null || s[1]===null) return;
        if(f.home===t.name){ gf+=s[0]; ga+=s[1]; p++; if(s[0]>s[1])w++; else if(s[0]===s[1])d++; else l++; }
        if(f.away===t.name){ gf+=s[1]; ga+=s[0]; p++; if(s[1]>s[0])w++; else if(s[0]===s[1])d++; else l++; }
      });
      return{...t,p,w,d,l,gf,ga,gd:gf-ga,pts:w*3+d};
    }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd);
    
    grid.innerHTML+=`<div class="group-card"><div class="group-card-head">Group ${grp}<div class="cols"><span>P</span><span>GD</span><span>PTS</span></div></div>`+
      stats.map((t,i)=>`<div class="grow ${i<2?'qualify':''}">`+
        `<div class="gpos">${i+1}</div><div class="gflag">${t.flag}</div><div class="gname">${t.name}</div>`+
        `<div class="gcols"><span>${t.p}</span><span>${t.gd>=0?'+':''}${t.gd}</span></div><div class="gpts">${t.pts}</div></div>`).join('')+`</div>`;
  });
}

function simulateGroupsAndRunKnockouts() {
  const pool = [0,1,1,2,2,3,4];
  
  // 1. Simulate the group stage results
  FIXTURES.forEach(f => { 
    if(!f.isKO) scores[f.id] = [pool[Math.floor(Math.random()*pool.length)], pool[Math.floor(Math.random()*pool.length)]]; 
  });
  
  // 2. Compute group final layouts and wire real countries to Round of 32 slots
  calculateGroupStandingsAndSeedR32();

  // 3. Compute knockout stages sequentially
  FIXTURES.forEach(f => {
    if(f.isKO) {
      let hG = Math.floor(Math.random()*4), aG = Math.floor(Math.random()*4);
      scores[f.id] = [hG, aG];
      if (hG === aG) penScores[f.id] = [Math.random() > 0.5 ? 5 : 4, 3];
      evaluateKnockoutProgression(f.id);
    }
  });

  // 4. Trigger UI redrawing to render updated country labels
  renderStandings();
  renderFixtures(); 
}

function resetStandings(){ 
  scores={}; 
  penScores={}; 
  FIXTURES.forEach(f => {
    if(f.isKO) {
      const originalBlueprint = R32_SEED_BLUEPRINT.find(b => b.id === f.id);
      if(originalBlueprint) {
        f.home = `${originalBlueprint.homeSource.type} Group ${originalBlueprint.homeSource.grp || '3rd'}`;
        f.away = `${originalBlueprint.awaySource.type} Group ${originalBlueprint.awaySource.grp || '3rd'}`;
      } else {
        f.home = "Pending";
        f.away = "Pending";
      }
    }
  });
  renderFixtures(); 
  renderStandings(); 
}

function changeSquad(n, btn) { document.querySelectorAll('.nation-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderSquad(n); }
function renderSquad(n){ const sq=SQUADS[n]; if(!sq) return; document.getElementById('squadMeta').innerHTML=`<div class="squad-meta-item">🌍 <strong>Rank:</strong> #${sq.rank}</div><div class="squad-meta-item">👤 <strong>Manager:</strong> ${sq.coach}</div>`; let html='<div class="pos-section">'; sq.fwd.forEach(p=>{ html+=`<span class="player-pill star">${p}</span>`; }); html+='</div>'; document.getElementById('squadDisplay').innerHTML=html; }
function renderOdds(){ const el=document.getElementById('oddsGrid1'); ODDS.forEach(o=>{ el.innerHTML+=`<div class="odds-card"><div class="odds-flag">${o.flag}</div><div class="odds-name">${o.nation}</div><div class="odds-val">${o.odds}</div></div>`; }); }
let oddsDrawn=false; function drawOddsChart(){ if(oddsDrawn)return; oddsDrawn=true; new Chart(document.getElementById('oddsChart'),{type:'bar',data:{labels:ODDS.map(o=>o.nation),datasets:[{data:ODDS.map(o=>o.prob),backgroundColor:'#f5a623'}]},\noptions:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}}); }

// Safety wrap initializations to run only AFTER the DOM is fully constructed
document.addEventListener('DOMContentLoaded', () => {
  calculateGroupStandingsAndSeedR32(); // Seed fallback placeholders into code tree
  renderFixtures();
  renderStandings();
  initSquads();
  renderOdds();
});
</script>
</body>
